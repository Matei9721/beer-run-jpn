<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoozeRunJpn</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <!-- Leaflet MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>BoozeRunJpn 🍺🇯🇵</h1>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="leaderboard-tab">Leaderboard</button>
            <button class="tab-btn" data-tab="map-tab">Map</button>
            <button class="tab-btn" data-tab="log-tab">Log Drink</button>
        </nav>

        <section id="leaderboard-tab" class="tab-content active">
            <h2>Leaderboard</h2>
            <div id="leaderboard-data" class="card">
                <p>Loading leaderboard...</p>
            </div>
        </section>

        <section id="map-tab" class="tab-content">
            <h2>Drink Map</h2>
            <div class="card">
                <div class="form-group">
                    <label for="user-filter">Filter by User:</label>
                    <select id="user-filter">
                        <option value="">Select User</option>
                    </select>
                </div>
                <div id="map"></div>
            </div>
        </section>

        <section id="log-tab" class="tab-content">
            <h2>Log a Drink</h2>
            <form id="entry-form" class="card" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required placeholder="e.g., BeerMaster99">
                </div>
                <div class="form-group">
                    <label for="drink_type">Type:</label>
                    <select id="drink_type" name="drink_type" required>
                        <option value="Beer">Beer</option>
                        <option value="Sake">Sake</option>
                        <option value="Chu-hi">Chu-hi</option>
                        <option value="Highball">Highball</option>
                        <option value="Ume-shu">Ume-shu</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="brand">Brand (Optional):</label>
                    <input type="text" id="brand" name="brand" placeholder="e.g., Asahi">
                </div>
                <div class="form-group">
                    <label for="abv">Alcohol (%):</label>
                    <input type="number" id="abv" name="abv" step="0.1" required placeholder="e.g., 5.0">
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity (Liters):</label>
                    <input type="number" id="quantity" name="quantity" step="0.01" required placeholder="e.g., 0.5">
                </div>
                <div class="form-group">
                    <label for="image">Proof (Photo):</label>
                    <input type="file" id="image" name="image" accept="image/*">
                </div>
                
                <!-- Hidden inputs for location -->
                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">

                <button type="button" id="get-location-btn" class="secondary-btn">Fetch My Location 📍</button>
                <div id="location-status" class="status-msg">Fetching location...</div>

                <button type="submit" id="submit-btn">Log It!</button>
            </form>
        </section>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Leaflet MarkerCluster JS -->
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
