<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>BeerRunJPN Wrapped</title>
    <link rel="icon" type="image/jpeg" href="/static/img/logo.png">
    <link rel="stylesheet" href="/static/css/wrapped.css?v=26">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <main id="wrapped-app" class="wrapped-app" aria-live="polite">
        <div id="start-screen" class="start-screen">
            <div class="start-media" aria-hidden="true">
                <div class="start-disc">BRJ</div>
                <div class="start-lines">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
            <p class="start-kicker">BeerRunJPN presents</p>
            <h1>Wrapped</h1>
            <p class="start-copy">The final trip recap, with receipts.</p>
            <button id="start-btn" class="start-btn" type="button">START REEL</button>
        </div>

        <section id="slide-stage" class="slide-stage" aria-label="Wrapped slides"></section>

        <div id="progress-track" class="progress-track" aria-hidden="true"></div>

        <div class="tap-zones" aria-hidden="true">
            <button id="prev-zone" class="tap-zone tap-zone-left" type="button" tabindex="-1"></button>
            <button id="next-zone" class="tap-zone tap-zone-right" type="button" tabindex="-1"></button>
        </div>

        <header class="wrapped-topbar">
            <a class="icon-link" href="/" aria-label="Back to BeerRunJPN">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M19 12H5"></path>
                    <path d="m12 19-7-7 7-7"></path>
                </svg>
            </a>
            <div class="topbar-actions">
                <label id="volume-control" class="volume-control" aria-label="Music volume">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M11 5 6 9H3v6h3l5 4V5Z"></path>
                        <path d="M15.5 8.5a5 5 0 0 1 0 7"></path>
                    </svg>
                    <input id="volume-slider" type="range" min="0" max="100" value="5">
                </label>
                <button id="pause-btn" class="icon-btn" type="button" aria-label="Pause reel"></button>
                <button id="audio-btn" class="icon-btn" type="button" aria-label="Toggle music"></button>
            </div>
        </header>

        <nav class="wrapped-controls" aria-label="Wrapped controls">
            <button id="prev-btn" class="control-btn" type="button" aria-label="Previous slide">&lt;</button>
            <div id="slide-counter" class="slide-counter">1 / 1</div>
            <button id="next-btn" class="control-btn" type="button" aria-label="Next slide">&gt;</button>
        </nav>
    </main>

    <script type="module" src="/static/js/wrapped.js?v=18"></script>
</body>
</html>
